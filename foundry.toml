[profile.default]
src = "contracts"
test = "test"
out = "foundry-out"
cache_path = "foundry-cache"
libs = ["node_modules", "lib"]

# Compiler settings
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

# Gas reporting
gas_reports = ["*"]

# Fuzzing configuration
[profile.default.fuzz]
runs = 10000          # Number of fuzz runs
max_test_rejects = 65536  # Max rejected inputs
seed = "0x1"        # Random seed (omit for random)

# Invariant testing
[profile.default.invariant]
runs = 256          # Number of invariant runs
depth = 32          # Call sequence depth
fail_on_revert = false  # Don't fail on revert (test recovery paths)

[profile.ci]
fuzz = { runs = 100000 }
invariant = { runs = 1024, depth = 64 }
